<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kəşf Et - CodeMaster</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-brand">
        <i class="fas fa-code"></i>
        <span>CodeMaster</span>
      </div>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Ana Səhifə</a>
        <a href="lessons.html">Dərslər</a>
        <a href="discover.html" class="active">Kəşf Et</a>
        <a href="profile.html">Profil</a>
      </div>
      <div class="nav-auth" id="navAuth">
        <a href="login.html" class="btn btn-outline">Daxil ol</a>
        <a href="register.html" class="btn btn-primary">Qeydiyyat</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
    </nav>

    <!-- Discover Header -->
    <section class="discover-header">
      <div class="container">
        <h1>İcma Kodları</h1>
        <p>Digər tələbələrin paylaşdığı kodları kəşf et və öyrən</p>

        <div class="discover-tabs">
          <button class="tab-btn active" data-sort="recent">Ən Yeni</button>
          <button class="tab-btn" data-sort="popular">Ən Populyar</button>
        </div>
      </div>
    </section>

    <!-- Code Grid -->
    <section class="discover-section">
      <div class="container">
        <div class="code-grid" id="codeGrid">
          <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Kodlar yüklənir...</p>
          </div>
        </div>
        <div class="load-more" id="loadMore" style="display: none">
          <button class="btn btn-outline" id="loadMoreBtn">
            Daha Çox Göstər
          </button>
        </div>
      </div>
    </section>

    <!-- Code Detail Modal -->
    <div class="modal modal-large" id="codeModal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="code-header-info">
            <h3 id="modalCodeTitle">Kod Başlığı</h3>
            <p id="modalCodeAuthor">@username • HTML Dərsi</p>
          </div>
          <button class="modal-close" id="closeCodeModal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="code-preview-modal">
            <iframe
              id="modalPreview"
              sandbox="allow-forms allow-scripts allow-same-origin"
            ></iframe>
          </div>
          <div class="code-actions-bar">
            <button class="btn btn-icon" id="modalLikeBtn">
              <i class="far fa-heart"></i>
              <span id="modalLikesCount">0</span>
            </button>
            <a
              href="#"
              class="btn btn-outline btn-sm"
              id="modalGithubLink"
              target="_blank"
              style="display: none"
            >
              <i class="fab fa-github"></i>
              GitHub-da Bax
            </a>
          </div>
          <div class="comments-section">
            <h4>Şərhlər</h4>
            <div class="comments-list" id="commentsList"></div>
            <form class="comment-form" id="commentForm">
              <textarea placeholder="Şərh yaz..." required></textarea>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
    <script src="js/discover.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        updateNavigation();
        loadDiscover();

        // Tab switching
        document.querySelectorAll(".discover-tabs .tab-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            document
              .querySelectorAll(".discover-tabs .tab-btn")
              .forEach((b) => b.classList.remove("active"));
            e.target.classList.add("active");
            loadDiscover(e.target.dataset.sort);
          });
        });
      });
    </script>
  </body>
</html>
