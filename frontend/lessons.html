<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dərslər - CodeMaster</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-brand">
        <i class="fas fa-code"></i>
        <span>CodeMaster</span>
      </div>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Ana Səhifə</a>
        <a href="lessons.html" class="active">Dərslər</a>
        <a href="discover.html">Kəşf Et</a>
        <a href="profile.html">Profil</a>
      </div>
      <div class="nav-auth" id="navAuth">
        <a href="login.html" class="btn btn-outline">Daxil ol</a>
        <a href="register.html" class="btn btn-primary">Qeydiyyat</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
    </nav>

    <!-- Lessons Header -->
    <section class="lessons-header">
      <div class="container">
        <h1>Dərslər Kataloqu</h1>
        <p>Öyrənməyə başlamaq üçün bir dərs seç</p>

        <div class="lessons-filters">
          <button class="filter-btn active" data-filter="all">Hamısı</button>
          <button class="filter-btn" data-filter="HTML">HTML</button>
          <button class="filter-btn" data-filter="CSS">CSS</button>
          <button class="filter-btn" data-filter="JavaScript">
            JavaScript
          </button>
          <button class="filter-btn" data-filter="React">React</button>
        </div>
      </div>
    </section>

    <!-- Lessons Grid -->
    <section class="lessons-section">
      <div class="container">
        <div class="lessons-grid" id="lessonsGrid">
          <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Dərslər yüklənir...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Progress Sidebar -->
    <aside class="progress-sidebar" id="progressSidebar">
      <div class="progress-card">
        <h3>Ümumi İrəliləyiş</h3>
        <div class="progress-circle" id="progressCircle">
          <svg viewBox="0 0 36 36">
            <path
              class="circle-bg"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
            />
            <path
              class="circle-progress"
              stroke-dasharray="0, 100"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
            />
          </svg>
          <div class="progress-percentage" id="progressPercentage">0%</div>
        </div>
        <p class="progress-text">
          <span id="completedCount">0</span> /
          <span id="totalCount">0</span> dərs tamamlandı
        </p>
      </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
    <script src="js/lessons.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        checkAuth();
        updateNavigation();
        loadLessons();

        // Filter buttons
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            document
              .querySelectorAll(".filter-btn")
              .forEach((b) => b.classList.remove("active"));
            e.target.classList.add("active");
            filterLessons(e.target.dataset.filter);
          });
        });
      });
    </script>
  </body>
</html>
