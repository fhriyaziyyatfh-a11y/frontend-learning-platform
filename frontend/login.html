<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daxil Ol - CodeMaster</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-logo">
            <i class="fas fa-code"></i>
            <span>CodeMaster</span>
          </a>
          <h1>Hesabına Daxil Ol</h1>
          <p>Öyrənməyə davam etmək üçün daxil ol</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="email@example.com"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Şifrə</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="••••••••"
              />
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox">
              <input type="checkbox" id="remember" />
              <span class="checkmark"></span>
              Məni xatırla
            </label>
            <a href="#" class="forgot-password">Şifrəni unutdun?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            <span class="btn-text">Daxil Ol</span>
            <span class="btn-loader" style="display: none">
              <i class="fas fa-spinner fa-spin"></i>
            </span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Hesabın yoxdur? <a href="register.html">Qeydiyyatdan keç</a></p>
        </div>
      </div>

      <div class="auth-visual">
        <div class="auth-quote">
          <i class="fas fa-quote-left"></i>
          <p>"Kod yazmağı öyrənmək gələcəyini şəkilləndirməkdir."</p>
          <span>— CodeMaster Təlimatçısı</span>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("submitBtn");

        // Toggle password visibility
        togglePassword?.addEventListener("click", () => {
          const type = passwordInput.type === "password" ? "text" : "password";
          passwordInput.type = type;
          togglePassword.innerHTML =
            type === "password"
              ? '<i class="fas fa-eye"></i>'
              : '<i class="fas fa-eye-slash"></i>';
        });

        // Handle login
        loginForm?.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          // Show loader
          submitBtn.disabled = true;
          submitBtn.querySelector(".btn-text").style.display = "none";
          submitBtn.querySelector(".btn-loader").style.display = "inline-block";

          try {
            const result = await login(email, password);

            if (result.success) {
              showToast("Uğurla daxil oldunuz!", "success");
              setTimeout(() => {
                window.location.href = "lessons.html";
              }, 1000);
            } else {
              showToast(result.message || "Daxil olmaq alınmadı", "error");
            }
          } catch (error) {
            showToast("Xəta baş verdi", "error");
          } finally {
            submitBtn.disabled = false;
            submitBtn.querySelector(".btn-text").style.display = "inline-block";
            submitBtn.querySelector(".btn-loader").style.display = "none";
          }
        });
      });
    </script>
  </body>
</html>
