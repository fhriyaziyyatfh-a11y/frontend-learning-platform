<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qeydiyyat - CodeMaster</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-logo">
            <i class="fas fa-code"></i>
            <span>CodeMaster</span>
          </a>
          <h1>Yeni Hesab Yarat</h1>
          <p>Öyrənmə səyahətinə başla</p>
        </div>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="name">Ad Soyad</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="Ad Soyad"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="email@example.com"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Şifrə</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                required
                minlength="6"
                placeholder="Min. 6 simvol"
              />
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength" id="passwordStrength"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Şifrəni Təkrarla</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox">
              <input type="checkbox" id="terms" required />
              <span class="checkmark"></span>
              <a href="#">Qaydalar və Şərtləri</a> qəbul edirəm
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            <span class="btn-text">Qeydiyyatdan Keç</span>
            <span class="btn-loader" style="display: none">
              <i class="fas fa-spinner fa-spin"></i>
            </span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Hesabın var? <a href="login.html">Daxil ol</a></p>
        </div>
      </div>

      <div class="auth-visual">
        <div class="auth-features">
          <div class="auth-feature">
            <i class="fas fa-graduation-cap"></i>
            <span>50+ İnteraktiv Dərs</span>
          </div>
          <div class="auth-feature">
            <i class="fas fa-robot"></i>
            <span>AI Kod Analizi</span>
          </div>
          <div class="auth-feature">
            <i class="fas fa-trophy"></i>
            <span>Oyunlaşdırılmış</span>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const registerForm = document.getElementById("registerForm");
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");
        const submitBtn = document.getElementById("submitBtn");

        // Toggle password visibility
        togglePassword?.addEventListener("click", () => {
          const type = passwordInput.type === "password" ? "text" : "password";
          passwordInput.type = type;
          togglePassword.innerHTML =
            type === "password"
              ? '<i class="fas fa-eye"></i>'
              : '<i class="fas fa-eye-slash"></i>';
        });

        // Password strength indicator
        passwordInput?.addEventListener("input", (e) => {
          const value = e.target.value;
          const strength = document.getElementById("passwordStrength");

          if (value.length === 0) {
            strength.className = "password-strength";
            strength.textContent = "";
          } else if (value.length < 6) {
            strength.className = "password-strength weak";
            strength.textContent = "Zəif";
          } else if (value.length < 10) {
            strength.className = "password-strength medium";
            strength.textContent = "Orta";
          } else {
            strength.className = "password-strength strong";
            strength.textContent = "Güclü";
          }
        });

        // Handle register
        registerForm?.addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = passwordInput.value;
          const confirmPassword = confirmInput.value;

          if (password !== confirmPassword) {
            showToast("Şifrələr uyğun gəlmir!", "error");
            return;
          }

          // Show loader
          submitBtn.disabled = true;
          submitBtn.querySelector(".btn-text").style.display = "none";
          submitBtn.querySelector(".btn-loader").style.display = "inline-block";

          try {
            const result = await register(name, email, password);

            if (result.success) {
              showToast("Qeydiyyat uğurlu! Yönləndirilir...", "success");
              setTimeout(() => {
                window.location.href = "lessons.html";
              }, 1500);
            } else {
              showToast(result.message || "Qeydiyyat alınmadı", "error");
            }
          } catch (error) {
            showToast("Xəta baş verdi", "error");
          } finally {
            submitBtn.disabled = false;
            submitBtn.querySelector(".btn-text").style.display = "inline-block";
            submitBtn.querySelector(".btn-loader").style.display = "none";
          }
        });
      });
    </script>
  </body>
</html>
